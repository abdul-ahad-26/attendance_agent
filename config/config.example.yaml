settings:
  join_early_minutes: 3         # Join N minutes before class start
  stay_extra_minutes: 5         # Stay N minutes after class ends
  max_wait_for_meeting: 15      # Poll up to N minutes if meeting hasn't started yet
  poll_interval_seconds: 15     # How often to check for active meeting
  retry_join_attempts: 3        # Retry joining if first attempt fails

  browser:
    headless: false             # Set true once everything works reliably
    channel: "msedge"           # Browser: msedge, chromium, chrome

  notifications:
    desktop_toast: true         # Show desktop notifications on join/fail
    discord_webhook_url: ""     # Optional: Discord webhook URL for phone alerts
