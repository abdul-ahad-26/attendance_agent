# ============================================================
# MS Teams Auto-Join Agent - Configuration
# ============================================================
#
# SETUP:
#   1. Copy this file:  cp config.example.yaml config.yaml
#   2. Edit config.yaml with YOUR email, timetable, and team/channel names
#   3. config.yaml is gitignored - your data stays private
#
# ============================================================

student:
  email: "your.email@university.edu"    # Your university email (used for reference only)

# Your weekly class timetable.
# Add one entry per class session. If a class repeats on multiple days,
# add a separate entry for each day.
#
# Fields:
#   name             - Any label you want (shown in logs/notifications)
#   day              - Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday
#   time             - Class start time in 24-hour format (HH:MM)
#   duration_minutes - How long the class lasts in minutes
#   team             - Exact Team name as it appears in MS Teams
#   channel          - Exact Channel name under that team

timetable:
  - name: "Data Structures (Mon)"
    day: "Monday"
    time: "09:00"
    duration_minutes: 120
    team: "Your Team Name"
    channel: "General"

  - name: "Algorithms (Mon)"
    day: "Monday"
    time: "11:00"
    duration_minutes: 90
    team: "Your Team Name"
    channel: "Algorithms"

  # Add more classes below...
  # - name: "Another Class (Tue)"
  #   day: "Tuesday"
  #   time: "14:00"
  #   duration_minutes: 60
  #   team: "Your Team Name"
  #   channel: "Channel Name"

settings:
  join_early_minutes: 3         # Join N minutes before class start
  stay_extra_minutes: 5         # Stay N minutes after class ends
  max_wait_for_meeting: 15      # Poll up to N minutes if meeting hasn't started yet
  poll_interval_seconds: 15     # How often to check for active meeting
  retry_join_attempts: 3        # Retry joining if first attempt fails

  browser:
    headless: false             # Set true once everything works reliably
    channel: "msedge"           # Browser: msedge, chromium, chrome

  notifications:
    desktop_toast: true         # Show desktop notifications on join/fail
    discord_webhook_url: ""     # Optional: Discord webhook URL for phone alerts
